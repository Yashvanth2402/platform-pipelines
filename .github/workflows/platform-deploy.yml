# ============================================================
# platform-deploy.yml
# Lives in: Yashvanth2402/platform-pipelines/.github/workflows/
# Owned by: Platform Team
#
# Branching strategy:
#   dev       → environment: dev     (auto, no approval)
#   release/* → environment: staging (1 QA approval)
#               after staging: environment: production (manual approval)
#   main      → NOT called from here (main is archive only)
#
# Deployment mechanism: ArgoCD on GKE
#   - This workflow updates helm/values-{env}.yaml with new image tag
#   - Commits and pushes to app repo
#   - ArgoCD detects the commit and syncs to GKE automatically
#
# Auth: Workload Identity Federation (same as agent-ui and mcp workflows)
# ============================================================

name: Platform Deploy

on:
  workflow_call:
    inputs:
      image_tag:
        description: "Docker image SHA tag (github.sha from ci.yml)"
        required: true
        type: string

      repo_name:
        description: "Short repo name (e.g. java-game-service)"
        required: true
        type: string

      environment:
        description: "Target environment: dev | test | staging | production"
        required: true
        type: string

    secrets:
      SLACK_WEBHOOK_URL:
        required: true
      GCP_GITHUB_TOKEN:
        required: true
        # GitHub PAT with repo write access
        # Needed to commit helm values back to the app repo
      # Environment URLs for smoke tests
      DEV_URL:
        required: false
      TEST_URL:
        required: false
      STAGING_URL:
        required: false
      PROD_URL:
        required: false

# ─────────────────────────────────────────────────────────────
# ENVIRONMENT GATES
# Configured in GitHub Settings → Environments:
#   dev        → no reviewers, auto deploy
#   test       → no reviewers, auto deploy
#   staging    → 1 QA reviewer required
#   production → 2 reviewers required + wait timer 10 min
# ─────────────────────────────────────────────────────────────

jobs:

  # ─────────────────────────────────────────────
  # VALIDATE
  # ─────────────────────────────────────────────
  validate:
    name: Validate inputs
    runs-on: ubuntu-latest
    steps:
      - name: Validate environment
        run: |
          VALID="dev test staging production"
          if ! echo "$VALID" | grep -w "${{ inputs.environment }}" > /dev/null; then
            echo "ERROR: Invalid environment '${{ inputs.environment }}'"
            echo "Must be one of: $VALID"
            exit 1
          fi
          echo "Environment : ${{ inputs.environment }} ✅"
          echo "Image tag   : ${{ inputs.image_tag }} ✅"
          echo "Repo name   : ${{ inputs.repo_name }} ✅"

  # ─────────────────────────────────────────────
  # DEPLOY TO TARGET ENVIRONMENT
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy → ${{ inputs.environment }}
    runs-on: ubuntu-latest
    needs: validate

    # GitHub environment gate — approval rules in GitHub Settings
    environment:
      name: ${{ inputs.environment }}

    permissions:
      contents: write   # commit helm values to app repo
      id-token: write   # Workload Identity Federation

    steps:
      # ── 1. Authenticate to GCP via Workload Identity ──────────
      # Same WIF setup used by agent-ui.yml and mcp.yml
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/878324400340/locations/global/workloadIdentityPools/github-provider/providers/github-provider
          service_account: cicd-agent-sa@project-166a7983-818b-43fa-932.iam.gserviceaccount.com
          audience: sts.googleapis.com

      # ── 2. Setup gcloud ───────────────────────────────────────
      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Set GCP project
        run: gcloud config set project project-166a7983-818b-43fa-932

      # ── 3. Verify Docker image exists in Artifact Registry ────
      # Safety check — confirm CI actually built and pushed the image
      - name: Verify image exists in Artifact Registry
        run: |
          IMAGE="us-central1-docker.pkg.dev/project-166a7983-818b-43fa-932/cicd-agent-repo/${{ inputs.repo_name }}:${{ inputs.image_tag }}"
          echo "Verifying: $IMAGE"
          if gcloud artifacts docker images describe "$IMAGE" > /dev/null 2>&1; then
            echo "Image verified in Artifact Registry ✅"
          else
            echo "ERROR: Image not found: $IMAGE"
            echo "Ensure ci.yml completed and pushed the image before deploy."
            exit 1
          fi

      # ── 4. Checkout the APP repo ──────────────────────────────
      # Platform deploys to the app repo — not the platform repo
      - name: Checkout ${{ inputs.repo_name }}
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/${{ inputs.repo_name }}
          token: ${{ secrets.GCP_GITHUB_TOKEN }}
          fetch-depth: 1

      # ── 5. Install yq ─────────────────────────────────────────
      - name: Install yq
        run: sudo snap install yq

      # ── 6. Update helm values file ────────────────────────────
      # Map environment → helm values file
      # Only image.tag changes — everything else stays as-is
      - name: Update helm/values-{env}.yaml
        run: |
          case "${{ inputs.environment }}" in
            dev)        VALUES_FILE="helm/values-dev.yaml" ;;
            test)       VALUES_FILE="helm/values-test.yaml" ;;
            staging)    VALUES_FILE="helm/values-staging.yaml" ;;
            production) VALUES_FILE="helm/values-prod.yaml" ;;
          esac

          echo "Updating $VALUES_FILE → image.tag: ${{ inputs.image_tag }}"

          if [ ! -f "$VALUES_FILE" ]; then
            echo "ERROR: $VALUES_FILE not found."
            echo "Create this file to enable ${{ inputs.environment }} deployments."
            exit 1
          fi

          yq e '.image.tag = "${{ inputs.image_tag }}"' -i "$VALUES_FILE"
          echo "Updated ✅"
          echo "--- New values ---"
          cat "$VALUES_FILE"

      # ── 7. Commit and push → ArgoCD detects and syncs to GKE ──
      - name: Commit helm values → trigger ArgoCD sync
        run: |
          case "${{ inputs.environment }}" in
            dev)        VALUES_FILE="helm/values-dev.yaml" ;;
            test)       VALUES_FILE="helm/values-test.yaml" ;;
            staging)    VALUES_FILE="helm/values-staging.yaml" ;;
            production) VALUES_FILE="helm/values-prod.yaml" ;;
          esac

          git config user.name  "platform-deploy-bot"
          git config user.email "platform-deploy-bot@users.noreply.github.com"
          git add "$VALUES_FILE"

          if git diff --staged --quiet; then
            echo "No change — image tag already up to date. ArgoCD already running this version."
          else
            git commit -m "deploy(${{ inputs.environment }}): ${{ inputs.repo_name }} → ${{ inputs.image_tag }}

Environment : ${{ inputs.environment }}
Deployed by : platform-deploy-bot
Triggered by: ${{ github.actor }}
Run         : ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            git push
            echo "Committed and pushed ✅"
            echo "ArgoCD is watching helm/ — it will sync ${{ inputs.environment }} automatically."
          fi

      # ── 8. Wait for ArgoCD to sync ────────────────────────────
      # ArgoCD polls every 3 minutes by default — but usually syncs within 30s
      - name: Wait for ArgoCD sync
        run: |
          case "${{ inputs.environment }}" in
            dev|test)             WAIT=30 ;;
            staging|production)   WAIT=60 ;;
          esac
          echo "Waiting ${WAIT}s for ArgoCD to sync ${{ inputs.environment }}..."
          sleep $WAIT

      # ── 9. Smoke test ──────────────────────────────────────────
      # Quick health check to confirm the app started correctly.
      # Uses {ENV}_URL secret set in each app repo.
      # Spring Boot: /actuator/health
      # Others: /health, /healthz, /api/health
      - name: Smoke test — ${{ inputs.environment }}
        run: |
          case "${{ inputs.environment }}" in
            dev)        ENV_URL="${{ secrets.DEV_URL }}" ;;
            test)       ENV_URL="${{ secrets.TEST_URL }}" ;;
            staging)    ENV_URL="${{ secrets.STAGING_URL }}" ;;
            production) ENV_URL="${{ secrets.PROD_URL }}" ;;
          esac

          if [ -z "$ENV_URL" ]; then
            echo "WARNING: No URL secret set for ${{ inputs.environment }}."
            echo "Set DEV_URL / TEST_URL / STAGING_URL / PROD_URL in repo secrets."
            echo "Skipping smoke test."
            exit 0
          fi

          echo "Running smoke test against: $ENV_URL"
          PASSED=false

          for ENDPOINT in "/actuator/health" "/health" "/healthz" "/api/health" "/api/game/health" "/"; do
            echo "Trying $ENV_URL$ENDPOINT ..."
            STATUS=$(curl --silent --output /dev/null --write-out "%{http_code}" \
              --retry 5 --retry-delay 10 --retry-connrefused \
              --max-time 30 \
              "$ENV_URL$ENDPOINT" 2>/dev/null || echo "000")

            if [ "$STATUS" = "200" ] || [ "$STATUS" = "204" ]; then
              echo "Smoke test PASSED ✅ ($ENV_URL$ENDPOINT → $STATUS)"
              PASSED=true
              break
            else
              echo "  → $ENDPOINT returned $STATUS"
            fi
          done

          if [ "$PASSED" = "false" ]; then
            echo "ERROR: Smoke test FAILED — no health endpoint returned 200."
            echo "App may not have started correctly in ${{ inputs.environment }}."
            echo "Check ArgoCD sync status and pod logs in GKE."
            exit 1
          fi

      # ── 10. Summary ────────────────────────────────────────────
      - name: Deployment summary
        if: success()
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "DEPLOYMENT SUCCESSFUL"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Repo        : ${{ inputs.repo_name }}"
          echo "Environment : ${{ inputs.environment }}"
          echo "Image tag   : ${{ inputs.image_tag }}"
          echo "Deployed by : ${{ github.actor }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

  # ─────────────────────────────────────────────
  # PROMOTE TO PRODUCTION
  # After staging succeeds, promote same image to production.
  # Only runs when environment=staging AND branch is release/*.
  # Production requires separate manual approval gate.
  # ─────────────────────────────────────────────
  promote-to-production:
    name: Promote → production
    runs-on: ubuntu-latest
    needs: deploy
    if: |
      success() &&
      inputs.environment == 'staging' &&
      startsWith(github.event.workflow_run.head_branch, 'release/')

    environment:
      name: production
      # Configured in GitHub Settings → Environments → production
      # Requires: 2 reviewers, 10 min wait timer

    permissions:
      contents: write
      id-token: write

    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/878324400340/locations/global/workloadIdentityPools/github-provider/providers/github-provider
          service_account: cicd-agent-sa@project-166a7983-818b-43fa-932.iam.gserviceaccount.com
          audience: sts.googleapis.com

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Verify image in Artifact Registry
        run: |
          IMAGE="us-central1-docker.pkg.dev/project-166a7983-818b-43fa-932/cicd-agent-repo/${{ inputs.repo_name }}:${{ inputs.image_tag }}"
          gcloud artifacts docker images describe "$IMAGE" > /dev/null 2>&1 || {
            echo "ERROR: Image not found: $IMAGE"
            exit 1
          }
          echo "Image verified ✅"

      - name: Checkout ${{ inputs.repo_name }}
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/${{ inputs.repo_name }}
          token: ${{ secrets.GCP_GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Install yq
        run: sudo snap install yq

      - name: Update helm/values-prod.yaml
        run: |
          VALUES_FILE="helm/values-prod.yaml"
          if [ ! -f "$VALUES_FILE" ]; then
            echo "ERROR: $VALUES_FILE not found."
            exit 1
          fi
          yq e '.image.tag = "${{ inputs.image_tag }}"' -i "$VALUES_FILE"
          echo "Updated helm/values-prod.yaml ✅"

      - name: Commit → trigger ArgoCD production sync
        run: |
          git config user.name  "platform-deploy-bot"
          git config user.email "platform-deploy-bot@users.noreply.github.com"
          git add helm/values-prod.yaml

          if git diff --staged --quiet; then
            echo "No change to commit."
          else
            git commit -m "deploy(production): ${{ inputs.repo_name }} → ${{ inputs.image_tag }}

Environment : production
Promoted from: staging
Deployed by : platform-deploy-bot
Triggered by: ${{ github.actor }}
Run         : ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            git push
            echo "Pushed to production ✅ — ArgoCD syncing..."
          fi

      - name: Wait for ArgoCD production sync
        run: |
          echo "Waiting 60s for ArgoCD to sync production..."
          sleep 60

      - name: Smoke test — production
        run: |
          ENV_URL="${{ secrets.PROD_URL }}"
          if [ -z "$ENV_URL" ]; then
            echo "WARNING: PROD_URL not set — skipping smoke test."
            exit 0
          fi

          echo "Running production smoke test: $ENV_URL"
          PASSED=false

          for ENDPOINT in "/actuator/health" "/health" "/healthz" "/api/health" "/api/game/health" "/"; do
            STATUS=$(curl --silent --output /dev/null --write-out "%{http_code}" \
              --retry 5 --retry-delay 15 --retry-connrefused \
              --max-time 30 \
              "$ENV_URL$ENDPOINT" 2>/dev/null || echo "000")

            if [ "$STATUS" = "200" ] || [ "$STATUS" = "204" ]; then
              echo "Production smoke test PASSED ✅ ($ENDPOINT → $STATUS)"
              PASSED=true
              break
            fi
          done

          if [ "$PASSED" = "false" ]; then
            echo "ERROR: Production smoke test FAILED."
            echo "Rollback via ArgoCD UI immediately."
            exit 1
          fi

      - name: Production deployment summary
        if: success()
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "PRODUCTION DEPLOYMENT SUCCESSFUL"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Repo        : ${{ inputs.repo_name }}"
          echo "Image tag   : ${{ inputs.image_tag }}"
          echo "Deployed by : ${{ github.actor }}"
          echo ""
          echo "NEXT STEPS (manual — after 24h):"
          echo "  1. Verify production metrics"
          echo "  2. Merge release/* → main (3 approvals required)"
          echo "  3. Create release tag: git tag v1.x.x"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

  # ─────────────────────────────────────────────
  # NOTIFY SUCCESS
  # ─────────────────────────────────────────────
  notify-success:
    name: Notify success
    runs-on: ubuntu-latest
    needs: [deploy]
    if: success()
    steps:
      - name: Slack — deploy success
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "✅ *Deploy succeeded*",
              "attachments": [{
                "color": "#36a64f",
                "fields": [
                  {"title": "Repo",        "value": "${{ inputs.repo_name }}", "short": true},
                  {"title": "Environment", "value": "${{ inputs.environment }}", "short": true},
                  {"title": "Image tag",   "value": "${{ inputs.image_tag }}", "short": true},
                  {"title": "Deployed by", "value": "${{ github.actor }}", "short": true}
                ]
              }]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  # ─────────────────────────────────────────────
  # NOTIFY FAILURE
  # ─────────────────────────────────────────────
  notify-failure:
    name: Notify failure
    runs-on: ubuntu-latest
    needs: [deploy]
    if: failure()
    steps:
      - name: Slack — deploy failed
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "❌ *Deploy FAILED*",
              "attachments": [{
                "color": "#ff0000",
                "fields": [
                  {"title": "Repo",        "value": "${{ inputs.repo_name }}", "short": true},
                  {"title": "Environment", "value": "${{ inputs.environment }}", "short": true},
                  {"title": "Image tag",   "value": "${{ inputs.image_tag }}", "short": true},
                  {"title": "Run URL",     "value": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}", "short": false}
                ]
              }]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
